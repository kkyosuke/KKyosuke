# https://api.slack.com/apps/A0B496WN117/general?
display_information:
  name: kyosuke.ai
  description: ai of kyosuke
  background_color: "#473b45"
features:
  bot_user:
    display_name: kyosuke.ai
    always_online: true
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  shortcuts:
    - name: Hey Cloudflare Wokers!
      type: global
      callback_id: hey-cf-workers
      description: Say hi to CF Workers
  slash_commands:
    - command: /hey-cf-workers
      url: https://local.kyosuke.dev/slack/
      description: Say hi to CF Workers
      usage_hint: Say hi to CF Workers
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - chat:write
      - chat:write.public
      - commands
      - im:history
  pkce_enabled: false
settings:
  event_subscriptions:
    request_url: https://local.kyosuke.dev/slack/
    bot_events:
      - app_mention
      - message.im
      - app_home_opened
  interactivity:
    is_enabled: true
    request_url: https://local.kyosuke.dev/slack/
    message_menu_options_url: https://local.kyosuke.dev/slack/
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  is_mcp_enabled: false
